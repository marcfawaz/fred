# =============================================================================
# values-local.yaml — k3d local development overrides
# =============================================================================
#
# This file overrides the defaults from deploy/charts/fred/values.yaml
# for a local k3d deployment. It contains the full configuration specific
# to local dev: locally-built images, k3d service names, test secrets, etc.
#
# Relationship with other values files:
#   - values.yaml          : default values (production-oriented)
#   - values-local.yaml    : overrides for k3d local dev (this file)
#   - values-gcp.yaml      : overrides for GCP
#
# Note: YAML anchors defined in values.yaml are NOT available in this file
# (each values file is parsed independently by Helm).
# Lists (e.g. input_processors) are fully replaced during merge — partial
# list overrides are not possible in Helm.
#
# Usage (from repo root):
#   make k3d-deploy          # build + import images + helm install (all-in-one)
#   make k3d-deploy-only     # helm install only (images already in k3d)
#
# Manual usage:
#   helm upgrade --install fred-app deploy/charts/fred \
#     --namespace fred \
#     -f deploy/local/k3d/values-local.yaml \
#     --wait --timeout 5m
#
# Prerequisites:
#   1. Build images:
#        cd agentic-backend && make docker-build && cd ..
#        cd knowledge-flow-backend && make docker-build && cd ..
#        cd frontend && make docker-build && cd ..
#   2. Import into k3d:
#        k3d image import ghcr.io/thalesgroup/fred-agent/agentic-backend:0.1 -c fred
#        k3d image import ghcr.io/thalesgroup/fred-agent/knowledge-flow-backend:0.1 -c fred
#        k3d image import ghcr.io/thalesgroup/fred-agent/frontend:0.1 -c fred
# =============================================================================

# ── Shared anchors (reused by knowledge-flow-backend and worker) ────────────

x-kf-security: &kf-security
  m2m:
    realm_url: "http://keycloak:8080/realms/app"
  user:
    realm_url: "http://keycloak:8080/realms/app"
  authorized_origins:
    - "http://localhost:8088"
  rebac:
    enabled: true
    type: openfga
    api_url: "http://openfga:9080"

x-kf-scheduler: &kf-scheduler
  enabled: true
  backend: "temporal"
  temporal:
    host: "temporal:7233"
    namespace: "default"
    task_queue: "ingestion"
    workflow_id_prefix: "pipeline"
    connect_timeout_seconds: 5

x-kf-content-storage: &kf-content-storage
  type: minio
  endpoint: http://minio:9000
  access_key: "admin"
  bucket_name: "app-content"
  secure: false

x-common-dotenv: &common-dotenv
  OPENAI_API_KEY: "" # pragma: allowlist secret
  FRED_POSTGRES_PASSWORD: "Azerty123_" # pragma: allowlist secret
  OPENSEARCH_PASSWORD: "FredOpensearch123!!" # pragma: allowlist secret
  OPENFGA_API_TOKEN: "Azerty123_" # pragma: allowlist secret
  AZURE_AD_CLIENT_SECRET: "" # pragma: allowlist secret
  AZURE_APIM_SUBSCRIPTION_KEY: "" # pragma: allowlist secret

x-kf-filesystem: &kf-filesystem
  type: minio
  endpoint: http://minio:9000
  access_key: "admin"
  bucket_name: "filesystem"
  secure: false


x-kf-embedding-model: &kf-embedding-model
  provider: openai
  name: mistral-embed
  settings:
    base_url: https://api.mistral.ai/v1
    check_embedding_ctx_length: false

x-kf-chat-model: &kf-chat-model
  provider: openai
  name: mistral-medium-latest
  settings:
    base_url: https://api.mistral.ai/v1

x-kf-vision-model: &kf-vision-model
  provider: openai
  name: mistral-medium-latest
  settings:
    base_url: https://api.mistral.ai/v1

x-kf-crossencoder-model: &kf-crossencoder-model
  settings:
    online: true
    local_path: ~/.cache/huggingface/hub
    max_retries: 0
    timeout:
      connect: 10.0
      read: 30.0
    http_client_limits:
      max_connections: 500
      max_keepalive_connections: 0
      keepalive_expiry_seconds: 10

x-kf-storage: &kf-storage
  postgres:
    host: postgres
    port: 5432
    database: fred
    username: fred
    pool_size: 2
    max_overflow: 0
    pool_timeout: 30
    pool_recycle: 1800
    pool_pre_ping: true
  opensearch:
    host: https://opensearch:9200
    secure: true
    verify_certs: false
    username: admin
  catalog_store:
    type: "postgres"
  prompt_store:
    type: "postgres"
  resource_store:
    type: "postgres"
  tag_store:
    type: "postgres"
  metadata_store:
    type: "postgres"
  task_store:
    type: "postgres"
    prefix: "sched_"
  vector_store:
    type: opensearch
    index: vector-index
    bulk_size: 1000
  kpi_store:
    type: "log"
    level: "DEBUG"
  log_store:
    type: "in_memory"
  tabular_store:
    artifacts_prefix: "tabular/datasets"
    format: "parquet"
    compression: "snappy"
    query:
      engine: "duckdb"
      access_mode: "presigned_url"
      internal_presigned_ttl_seconds: 3600
      default_max_rows: 200
      max_rows: 1000
x-kf-mcp: &kf-mcp
  tabular_enabled: true
  text_enabled: true
  prometheus_ops_enabled: true

x-cp-scheduler: &cp-scheduler
  enabled: true
  backend: "temporal"
  temporal:
    host: "temporal:7233"
    namespace: "default"
    task_queue: "control-plane-lifecycle"
    workflow_id_prefix: "control-plane"
    connect_timeout_seconds: 5

x-cp-storage: &cp-storage
  postgres:
    host: postgres
    port: 5432
    database: fred
    username: fred
    pool_size: 2
    max_overflow: 0
    pool_timeout: 30
    pool_recycle: 1800
    pool_pre_ping: true
  session_store:
    type: postgres
    table: session
  purge_queue_table: session_purge_queue
  content_storage:
    type: minio
    endpoint: http://minio:9000
    access_key: "admin"
    bucket_name: "control-plane-content"
    secure: false

global:
  kubeconfig: ""
  create_index:
    enabled: false
  persistence:
    enabled: false

applications:

  # ===========================================================================
  # AGENTIC BACKEND
  # ===========================================================================
  agentic-backend:
    image:
      tag: "0.1"
    migration:
      enabled: false
    # -------------------------------------------------------------------------
    # Agentic Backend — Application Configuration
    # -------------------------------------------------------------------------
    configuration:
      app:
        log_level: "info"
      scheduler:
        enabled: true
        backend: temporal
        temporal:
          host: "temporal:7233"

      security:
        m2m:
          realm_url: "http://keycloak:8080/realms/app"
        user:
          realm_url: "http://keycloak:8080/realms/app"
        authorized_origins:
          - "http://localhost:8088"
        rebac:
          enabled: true
          type: openfga
          api_url: "http://openfga:9080"

      ai:
        knowledge_flow_url: "http://knowledge-flow-backend:8000/knowledge-flow/v1"
        timeout:
          connect: 20
          read: 60
        recursion:
          recursion_limit: 40

      storage:
        postgres:
          host: postgres
          port: 5432
          database: fred
          username: fred
        opensearch:
          host: https://opensearch:9200
        feedback_store:
          type: "postgres"
        agent_store:
          type: "postgres"
        mcp_servers_store:
          type: "postgres"
        session_store:
          type: "postgres"
        attachments_store:
          type: "postgres"
        history_store:
          type: "postgres"
        task_store:
          type: "postgres"
        kpi_store:
          type: "log"
          level: "DEBUG"
        log_store:
          type: "in_memory"

    # -------------------------------------------------------------------------
    # Agentic Backend — Secrets (.env)
    # -------------------------------------------------------------------------
    dotenv:
      <<: *common-dotenv
      KEYCLOAK_AGENTIC_CLIENT_SECRET: "Azerty123_" # pragma: allowlist secret

    # -------------------------------------------------------------------------
    # Agentic Backend — Agent catalog (overrides default: only Georges)
    # -------------------------------------------------------------------------
    agents_catalog:
      version: v1
      agents:
        - id: "Rico"
          name: "Rico"
          type: "agent"
          class_path: "agentic_backend.agents.v1.production.rags.rag_expert.Rico"
          enabled: true
          chat_options:
            search_policy_selection: true
            libraries_selection: true
            search_rag_scoping: true
            deep_search_delegate: false
            attach_files: true
            include_corpus_in_search: true
        - id: "Tessa"
          name: "Tessa"
          type: "agent"
          class_path: "agentic_backend.agents.v1.production.tabular.tabular_expert.Tessa"
          enabled: true

        - id: "Spot"
          name: "Spot"
          type: "agent"
          class_path: "agentic_backend.agents.v1.production.prometheus.prometheus_expert.Spot"
          enabled: true

        - id: "SQL Agent"
          name: "SQL Agent"
          type: "agent"
          definition_ref: "v2.production.sql_analyst"
 
      react_profiles:
        - profile_id: "rag_expert"
          enabled: true
        - profile_id: "sentinel"
          enabled: true

    # -------------------------------------------------------------------------
    # Agentic Backend — Models catalog (overrides default: only default profile)
    # -------------------------------------------------------------------------
    models_catalog:
      version: v1
      common_model_settings:
        max_retries: 0
        timeout:
          connect: 10.0
          read: 120.0
          write: 30.0
          pool: 5.0
        http_client_limits:
          max_connections: 500
          max_keepalive_connections: 200
          keepalive_expiry_seconds: 10
        temperature: 0.0
      default_profile_by_capability:
        chat: default.chat.mistral
        language: default.language.mistral
      profiles:
        - profile_id: default.chat.mistral
          capability: chat
          model:
            provider: openai
            name: mistral-medium-latest
            settings:
              base_url: https://api.mistral.ai/v1
        - profile_id: default.language.mistral
          capability: language
          model:
            provider: openai
            name: mistral-medium-latest
            settings:
              base_url: https://api.mistral.ai/v1
      rules: []

    # -------------------------------------------------------------------------
    # Agentic Backend — MCP catalog (overrides default: only text search)
    # -------------------------------------------------------------------------
    mcp_catalog:
      version: v1
      servers:
        - id: "mcp-knowledge-flow-mcp-text"
          name: "mcp.servers.search_documents.name"
          description: "mcp.servers.search_documents.description"
          transport: "streamable_http"
          url: "http://knowledge-flow-backend:8000/knowledge-flow/v1/mcp-text"
          sse_read_timeout: 2000
          enabled: true
          auth_mode: "user_token"
        - id: "mcp-knowledge-flow-prometheus-ops"
          name: "mcp.servers.prometheus.name"
          description: "mcp.servers.prometheus.description"
          transport: "streamable_http"
          url: "http://knowledge-flow-backend:8000/knowledge-flow/v1/mcp-prometheus-ops"
          sse_read_timeout: 2000
          enabled: true
          auth_mode: "user_token"
        - id: "mcp-knowledge-flow-mcp-tabular"
          name: "mcp.servers.tabular.name"
          description: "mcp.servers.tabular.description"
          transport: "streamable_http"
          url: "http://knowledge-flow-backend:8000/knowledge-flow/v1/mcp-tabular"
          sse_read_timeout: 2000
          enabled: true
          auth_mode: "user_token"
  # ===========================================================================
  # FRONTEND
  # ===========================================================================
  frontend:
    image:
      tag: "0.1"
    env:
      - name: VITE_BACKEND_URL_KNOWLEDGE
        value: "http://localhost:8088"
    ingress:
      enabled: true
      className: "traefik"
      hosts:
        - host: ""
          paths:
            - path: /
              pathType: Prefix
              service:
                name: frontend
                port: 80
            - path: /agentic
              pathType: Prefix
              service:
                name: agentic-backend
                port: 80
            - path: /knowledge-flow
              pathType: Prefix
              service:
                name: knowledge-flow-backend
                port: 8000
            - path: /realms
              pathType: Prefix
              service:
                name: keycloak
                port: 8080
            - path: /resources
              pathType: Prefix
              service:
                name: keycloak
                port: 8080
            - path: /control-plane
              pathType: Prefix
              service:
                name: control-plane-backend
                port: 8222
      tls: []
    configuration:
      config_json:
        backend_url_api: "http://localhost:8088"
        backend_url_knowledge: "http://localhost:8088"
        websocket_url: "ws://localhost:8088/fred/chatbot/query"
        frontend_basename: "/"

  # ===========================================================================
  # KNOWLEDGE FLOW BACKEND
  # ===========================================================================
  knowledge-flow-backend:
    image:
      tag: "0.1"
    migration:
      enabled: false
    # -------------------------------------------------------------------------
    # Knowledge Flow Backend — Application Configuration
    # -------------------------------------------------------------------------
    configuration:
      security:        *kf-security
      scheduler:       *kf-scheduler
      content_storage: *kf-content-storage

      embedding_model:    *kf-embedding-model
      chat_model:         *kf-chat-model
      vision_model:       *kf-vision-model
      crossencoder_model: *kf-crossencoder-model

      storage:         *kf-storage
      integrations:
        prometheus:
          base_url: "http://prometheus:9090"
          verify_ssl: false
          timeout_seconds: 15.0
          username: "admin"
      mcp:             *kf-mcp
      filesystem:      *kf-filesystem

    dotenv: &kf-dotenv
      <<: *common-dotenv
      KEYCLOAK_KNOWLEDGE_FLOW_CLIENT_SECRET: "Azerty123_" # pragma: allowlist secret
      MINIO_SECRET_KEY: "Azerty123_" # pragma: allowlist secret
      OPENSEARCH_PASSWORD: "FredOpensearch123!!" # pragma: allowlist secret
      OPENFGA_API_TOKEN: "Azerty123_" # pragma: allowlist secret
      FRED_POSTGRES_PASSWORD: "Azerty123_" # pragma: allowlist secret
      TABULAR_POSTGRES_PASSWORD: "Azerty123_" # pragma: allowlist secret
      PROMETHEUS_PASSWORD: "" # pragma: allowlist secret
      PROMETHEUS_BEARER_TOKEN: "" # pragma: allowlist secret

  # ===========================================================================
  # KNOWLEDGE FLOW WORKER — disabled for now
  # ===========================================================================
  knowledge-flow-worker:
    enabled: true
    deployment:
      enabled: true
    image:
      tag: "0.1"
    configuration:
      security:           *kf-security
      scheduler:          *kf-scheduler
      content_storage:    *kf-content-storage
      embedding_model:    *kf-embedding-model
      chat_model:         *kf-chat-model
      vision_model:       *kf-vision-model
      crossencoder_model: *kf-crossencoder-model
      storage:            *kf-storage
      integrations:
        prometheus:
          base_url: "http://prometheus:9090"
          verify_ssl: false
          timeout_seconds: 15.0
          username: "admin"
      mcp:                *kf-mcp
      filesystem:         *kf-filesystem
    dotenv: *kf-dotenv

  # ===========================================================================
  # CONTROL PLANE BACKEND
  # ===========================================================================
  control-plane-backend:
    image:
      tag: "0.1"
    migration:
      enabled: false
    configuration:
      security:  *kf-security
      scheduler: *cp-scheduler
      storage:   *cp-storage
    dotenv: &cp-dotenv
      <<: *common-dotenv
      KEYCLOAK_CONTROL_PLANE_CLIENT_SECRET: "Azerty123_" # pragma: allowlist secret
      MINIO_SECRET_KEY: "Azerty123_" # pragma: allowlist secret

  # ===========================================================================
  # CONTROL PLANE WORKER
  # ===========================================================================
  control-plane-worker:
    enabled: true
    deployment:
      enabled: true
    image:
      tag: "0.1"
    configuration:
      security:  *kf-security
      scheduler: *cp-scheduler
      storage:   *cp-storage
    dotenv: *cp-dotenv
