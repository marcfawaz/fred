# ════════════════════════════════════════════════════════════════════
#  Fred Helm Chart — Default Values
#
#  QUICK-START: the ~15 values to customize for a new deployment:
#    1. Domain      : replace "{YOUR-URL}" with your hostname
#    2. API Keys    : applications.*.dotenv.OPENAI_API_KEY (or AZURE_OPENAI_API_KEY)
#    3. Auth        : applications.*.configuration.security.*.realm_url (Keycloak URL)
#    4. Temporal    : applications.knowledge-flow-backend.configuration.scheduler.temporal.host
#    5. Storage     : switch DuckDB stores to postgres/opensearch for production
#
#  DISABLE A COMPONENT  : applications.<name>.enabled: false
#  OVERRIDE VALUES      : helm install fred ./charts/fred -f my-overrides.yaml
#  MINIMAL EXAMPLE      : see deploy/charts/fred/custom-values-example.yaml
#
#  SECTIONS:
#    1. YAML Anchors   — shared blocks (eliminates duplication)
#    2. Global         — persistence, whitelist
#    3. Agentic Backend
#    4. Frontend
#    5. Knowledge Flow Backend
#    6. Knowledge Flow Worker
# ════════════════════════════════════════════════════════════════════

# ── 1. YAML Anchors (shared data — not used directly by Helm) ──────────────────────
#
# These blocks are referenced via YAML aliases (*anchor-name) in the sections below.
# Modifying them here automatically propagates changes to all applications.
# Note: Helm resolves these anchors transparently before rendering templates.

# ── Input processors for document ingestion ─────────────────────────────────────────
#
# fast   : uses LitePdfMarkdownProcessor (pypdfium2, faster)
# medium / rich : use PdfMarkdownProcessor (docling, better quality)

x-fast-input-processors: &fast-input-processors
  - suffix: ".pdf"
    class_path: knowledge_flow_backend.core.processors.input.lightweight_markdown_processor.lite_pdf_to_md_processor.LitePdfMarkdownProcessor
  - suffix: ".docx"
    class_path: knowledge_flow_backend.core.processors.input.docx_markdown_processor.docx_markdown_processor.DocxMarkdownProcessor
  - suffix: ".pptx"
    class_path: knowledge_flow_backend.core.processors.input.pptx_markdown_processor.pptx_markdown_processor.PptxMarkdownProcessor
  - suffix: ".csv"
    class_path: knowledge_flow_backend.core.processors.input.csv_tabular_processor.csv_tabular_processor.CsvTabularProcessor
  - suffix: ".txt"
    class_path: knowledge_flow_backend.core.processors.input.text_markdown_processor.text_markdown_processor.TextMarkdownProcessor
  - suffix: ".md"
    class_path: knowledge_flow_backend.core.processors.input.markdown_markdown_processor.markdown_markdown_processor.MarkdownMarkdownProcessor
  - suffix: ".jsonl"
    class_path: knowledge_flow_backend.core.processors.input.jsonl.jsonl_markdown_processor.JsonlMarkdownProcessor
  - suffix: ".png"
    class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
  - suffix: ".jpg"
    class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
  - suffix: ".jpeg"
    class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
  - suffix: ".gif"
    class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
  - suffix: ".bmp"
    class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
  - suffix: ".svg"
    class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
  - suffix: ".webp"
    class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
  - suffix: ".ico"
    class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor

x-rich-input-processors: &rich-input-processors
  - suffix: ".pdf"
    class_path: knowledge_flow_backend.core.processors.input.pdf_markdown_processor.pdf_markdown_processor.PdfMarkdownProcessor
  - suffix: ".docx"
    class_path: knowledge_flow_backend.core.processors.input.docx_markdown_processor.docx_markdown_processor.DocxMarkdownProcessor
  - suffix: ".pptx"
    class_path: knowledge_flow_backend.core.processors.input.pptx_markdown_processor.pptx_markdown_processor.PptxMarkdownProcessor
  - suffix: ".csv"
    class_path: knowledge_flow_backend.core.processors.input.csv_tabular_processor.csv_tabular_processor.CsvTabularProcessor
  - suffix: ".txt"
    class_path: knowledge_flow_backend.core.processors.input.text_markdown_processor.text_markdown_processor.TextMarkdownProcessor
  - suffix: ".md"
    class_path: knowledge_flow_backend.core.processors.input.markdown_markdown_processor.markdown_markdown_processor.MarkdownMarkdownProcessor
  - suffix: ".jsonl"
    class_path: knowledge_flow_backend.core.processors.input.jsonl.jsonl_markdown_processor.JsonlMarkdownProcessor
  - suffix: ".png"
    class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
  - suffix: ".jpg"
    class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
  - suffix: ".jpeg"
    class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
  - suffix: ".gif"
    class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
  - suffix: ".bmp"
    class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
  - suffix: ".svg"
    class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
  - suffix: ".webp"
    class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
  - suffix: ".ico"
    class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor

# ── Ingestion profiles ──────────────────────────────────────────────────────────────
#   fast   : pypdfium2, no OCR                  — ideal for text PDFs, fastest
#   medium : docling + selective OCR + tables  — balanced quality/cost profile
#   rich   : docling + full OCR + images       — best quality, slowest

x-profile-fast: &profile-fast
  use_gpu: true
  generate_summary: false
  process_images: false
  text_splitter:
    chunk_size: 1500
    chunk_overlap: 150
    preserve_tables: true
  pdf:
    backend: pypdfium2
    images_scale: 1.0
    generate_picture_images: false
    generate_page_images: false
    generate_table_images: false
    do_table_structure: false
    do_ocr: false
  input_processors: *fast-input-processors

x-profile-medium: &profile-medium
  use_gpu: true
  generate_summary: false
  process_images: false
  text_splitter:
    chunk_size: 1500
    chunk_overlap: 150
    preserve_tables: true
  pdf:
    backend: docling_parse
    images_scale: 1.5
    generate_picture_images: false
    generate_page_images: false
    generate_table_images: false
    do_table_structure: true
    do_ocr: true
    ocr_backend: openvino
    force_full_page_ocr: true
  input_processors: *rich-input-processors

x-profile-rich-backend: &profile-rich-backend
  use_gpu: true
  generate_summary: false
  process_images: true
  text_splitter:
    chunk_size: 1500
    chunk_overlap: 150
    preserve_tables: true
  pdf:
    backend: docling_parse
    images_scale: 2.0
    generate_picture_images: true
    generate_page_images: false
    generate_table_images: false
    do_table_structure: true
    do_ocr: true
    ocr_backend: openvino
    force_full_page_ocr: true
  input_processors: *rich-input-processors

# Rich profile for the Temporal worker: same as backend but generate_summary: true
x-profile-rich-worker: &profile-rich-worker
  <<: *profile-rich-backend
  generate_summary: true

# ── Shared knowledge-flow configuration (backend + worker) ──────────────────────────

x-kf-security: &kf-security
  m2m:
    enabled: true
    client_id: "knowledge-flow"
    realm_url: "http://{YOUR-URL}/{YOUR-REALM/app"
    secret_env_var: KEYCLOAK_KNOWLEDGE_FLOW_CLIENT_SECRET
  user:
    enabled: true
    client_id: "app"
    realm_url: "http://{YOUR-URL}/{YOUR-REALM/app"
  authorized_origins:
    - "http://{YOUR-URL}:80"
  rebac:
    enabled: true                    # Set false to bypass ReBAC (warning: all private resources will become public)
    type: openfga
    api_url: "http://openfga:8080"    # OpenFGA HTTP endpoint
    # store_name: "fred"                # OpenFGA store name. Reuse the same store across services
    # create_store_if_needed: true      # Automates store bootstrap (disable if pre-provisioned)
    # sync_schema_on_init: true         # Pushes the default Fred authorization model
    # authorization_model_id: null      # Authorization model id to use in case `sync_schema_on_init: false`
    # token_env_var: "OPENFGA_API_TOKEN" # Env var holding the bearer token
    # timeout_millisec: 2000            # Optional request timeout
    # headers:
    #   X-Custom-Header: "value"

x-kf-scheduler: &kf-scheduler
  enabled: true
  backend: "temporal"
  temporal:
    host: "localhost:7233"
    namespace: "default"
    task_queue: "ingestion"
    workflow_id_prefix: "pipeline"
    connect_timeout_seconds: 5

x-kf-content-storage: &kf-content-storage
  type: local
  root_path: /home/fred-user/.fred/knowledge-flow/content-storage
  # type: minio
  # endpoint: http://minio:9000
  # access_key: admin
  # bucket_name: app-bucket
  # secure: false
  # public_endpoint: https://minio.example.com  # Public URL for browser-facing presigned URLs
  # public_secure: true  # Optional, inferred from public_endpoint scheme if omitted

x-kf-document-sources: &kf-document-sources
  fred:
    type: push
    description: "Documents manually uploaded by users"
  local:
    type: pull
    provider: local_path
    base_path: ~/Documents/Fred
    description: "Personal local documents available for pull-mode ingestion"

x-kf-embedding-model: &kf-embedding-model
  provider: openai           # CUSTOMIZE: openai | azure | ollama
  name: text-embedding-3-large  
  settings: {}
  type: "openai"

x-kf-chat-model: &kf-chat-model
  provider: openai           # CUSTOMIZE: openai | azure | ollama
  name: gpt-4o-mini          # CUSTOMIZE: azure: deployment name, ollama: 'qwen2.5:3b-instruct' etc.
  settings: {}
  # openai: nothing else required (keys in .env)
  # azure: { endpoint: "...", api_version: "2024-08-01-preview" }
  # ollama: { base_url: "http://localhost:11434" }

x-kf-vision-model: &kf-vision-model
  provider: openai           # CUSTOMIZE
  name: gpt-4o-mini          # CUSTOMIZE: or gpt-4o if you want higher fidelity
  settings:
    temperature: 0           # optional
    max_retries: 2           # optional

x-kf-crossencoder-model: &kf-crossencoder-model
  name: cross-encoder/ms-marco-MiniLM-L-12-v2
  settings:
    online: false
    local_path: /home/fred-user/.cache/huggingface/hub

x-kf-storage: &kf-storage
  postgres:                  
    host: localhost
    port: 5432
    database: fred
    username: admin
  opensearch:                
    host: https://localhost:9200
    secure: true
    verify_certs: false
    username: admin
  catalog_store:
    type: "duckdb"
    duckdb_path: "/home/fred-user/.fred/knowledge-flow/catalog.duckdb"
  prompt_store:
    type: "duckdb"
    duckdb_path: "/home/fred-user/.fred/knowledge-flow/prompt.duckdb"
  resource_store:
    type: "duckdb"
    duckdb_path: "/home/fred-user/.fred/knowledge-flow/resource.duckdb"
  kpi_store:
    type: "log"
    level: "DEBUG"
  log_store:
    type: "in_memory"
  tag_store:
    type: "duckdb"
    duckdb_path: "/home/fred-user/.fred/knowledge-flow/tag.duckdb"
  metadata_store:
    type: "duckdb"
    duckdb_path: "/home/fred-user/.fred/knowledge-flow/metadata.duckdb"
  task_store:
    type: "postgres"
    table: workflow_tasks
    prefix: "sched_"
  vector_store:
    type: in_memory
  tabular_stores:
    base_database: # Minimal configuration to enable CSV document ingestion
      type: "sql"
      driver: "duckdb"
      database: "base_database"
      path: "/home/fred-user/.fred/knowledge-flow/db.duckdb"
      mode: "read_and_write"

x-kf-mcp: &kf-mcp
  reports_enabled: true
  kpi_enabled: true
  tabular_enabled: true
  statistic_enabled: true
  text_enabled: true
  templates_enabled: true
  resources_enabled: true
  filesystem_enabled: false
  opensearch_ops_enabled: false
  prometheus_ops_enabled: false
  neo4j_enabled: false

x-kf-filesystem: &kf-filesystem
  type: local
  # type: minio
  # endpoint: http://localhost:9000
  # access_key: admin
  # bucket_name: filesystem
  # secure: false

# ── Shared control-plane configuration (backend + worker) ────────────────────

x-cp-security: &cp-security
  m2m:
    enabled: true
    client_id: "control-plane"
    realm_url: "http://{YOUR-URL}/{YOUR-REALM/app"
    secret_env_var: KEYCLOAK_CONTROL_PLANE_CLIENT_SECRET
  user:
    enabled: true
    client_id: "app"
    realm_url: "http://{YOUR-URL}/{YOUR-REALM/app"
  authorized_origins:
    - "http://{YOUR-URL}:80"
  rebac:
    enabled: true
    type: openfga
    api_url: "http://openfga:8080"

x-cp-scheduler: &cp-scheduler
  enabled: true
  backend: "temporal"
  temporal:
    host: "localhost:7233"
    namespace: "default"
    task_queue: "control-plane-lifecycle"
    workflow_id_prefix: "control-plane"
