  content_storage:
    type: local
    root_path: /home/fred-user/.fred/control-plane/content-storage

# ════════════════════════════════════════════════════════════════════
# ── 2. Global settings ──────────────────────────────────────────────
global:
  kubeconfig: ""
  persistence:
    enabled: false # if true = Enable the creation of PVC when duckdb is used - Recommended TRUE
    dynamic: false # if true = let the PVCs create PVs if possible and do not create them manually
    accessModes: "ReadWriteOnce"
    reclaimPolicy: "Retain"
    storageClass: "local-path" # if empty = default storage class
    hostPath: "/mnt/fred-data" # only used if dynamic=false & storageClass=local-path, remind to create this directory on your host
  whitelist:
    enabled: false
    configMapName: ""
    filePath: "files/whitelist/users.txt"
    user_list_inline: ""
    mountPath: /fred-core/fred_core/security/whitelist_access_control/users.txt
    subPath: users.txt

# ── 3. Applications ──────────────────────────────────────────────────
applications:
  # ── 3.1 Agentic Backend ────────────────────────────────────────────
  agentic-backend:
    enabled: true
    applicationName: agentic-backend
    deployment:
      enabled: true
    replicaCount: 1
    statefulset:
      enabled: false
    job:
      enabled: false
    migration:
      enabled: false           # Run Alembic migrations via Helm hooks on deploy
      scaleDown: true         # Scale deployment to 0 before migrating (safe, downtime acceptable)
      backoffLimit: 3         # Retry count on migration failure
      # command: ["alembic"]  # Override migration command (default: alembic)
      # args: ["upgrade", "head"]  # Override migration args (default: upgrade head)
      # resources: {}         # Override resource limits for migration job
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    image:
      repository: ghcr.io/thalesgroup/fred-agent/agentic-backend
      tag: ""                    
      pullPolicy: IfNotPresent
    command:
      enabled: true
      data:
        - "uvicorn"
        - "agentic_backend.main:create_app"
        - "--factory"
        - "--host"
        - "0.0.0.0"
        - "--port"
        - "8000"
        - "--loop"
        - "asyncio"
    env:
      - name: CONFIG_FILE
        value: "/app/config/configuration.yaml"
      - name: FRED_AGENTS_CATALOG_FILE
        value: "/app/config/agents_catalog.yaml"
      - name: FRED_MODELS_CATALOG_FILE
        value: "/app/config/models_catalog.yaml"
      - name: FRED_MCP_CATALOG_FILE
        value: "/app/config/mcp_catalog.yaml"
      # Optional: override the default chat/language profile used by the agents
      # - name: FRED_MODELS_DEFAULT_CHAT_PROFILE_ID
      #   value: "chat.openai.gpt41mini"
      # - name: FRED_MODELS_DEFAULT_LANGUAGE_PROFILE_ID
      #   value: "language.openai.gpt41mini"
    ports:
      - name: http
        containerPort: 8000
      - name: metrics
        containerPort: 9000
    service:
      annotations: {}
      extraLabels: {}
      type: ClusterIP
      ports:
        - name: http
          port: 80
          targetPort: 8000
    metricsService:
      enabled: true
      annotations: {}
      extraLabels: {}
      type: ClusterIP
      port: 9000
      targetPort: 9000
      serviceMonitor:
        enabled: false
        annotations: {}
        labels: {}
        interval: 30s
        scrapeTimeout: 10s
        path: /metrics
        scheme: http
        honorLabels: false
        relabelings: []
        metricRelabelings: []
        namespaceSelector: {}
    ingress:
      enabled: false
      className: ""
      hosts: []
    volumeMounts:
      - name: agentic-backend-vol
        mountPath: /app/config/configuration.yaml
        subPath: configuration.yaml
      - name: agentic-backend-catalog-vol
        mountPath: /app/config/agents_catalog.yaml
        subPath: agents_catalog.yaml
      - name: agentic-backend-catalog-vol
        mountPath: /app/config/models_catalog.yaml
        subPath: models_catalog.yaml
      - name: agentic-backend-catalog-vol
        mountPath: /app/config/mcp_catalog.yaml
        subPath: mcp_catalog.yaml
      - name: agentic-backend-env-vol
        mountPath: /app/config/.env
        subPath: .env
      - name: agentic-backend-kube-vol
        mountPath: /home/fred-user/.kube/config
        subPath: kubeconfig
    volumes:
      - name: agentic-backend-vol
        configMap:
          name: agentic-backend-back
      - name: agentic-backend-catalog-vol
        configMap:
          name: agentic-backend-catalog
      - name: agentic-backend-env-vol
        secret:
          secretName: agentic-backend-env
      - name: agentic-backend-kube-vol
        configMap:
          name: agentic-backend-kube
          items:
            - key: kubeconfig
              path: kubeconfig
    probes:
      lifecycle:
        enabled: false
      livenessProbe:
        enabled: true
        data:
          httpGet:
            path: /agentic/v1/healthz
            port: 8000
      readinessProbe:
        enabled: true
        data:
          httpGet:
            path: /agentic/v1/ready
            port: 8000
      startupProbe:
        enabled: false
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - "ALL"
      runAsUser: 1000
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    serviceAccount:
      annotations: {}
      labels: {}
      automountServiceAccountToken: true
      rbac:
        enabled: true
        permissions:
          namespaced:
            - apiGroups: [""]
              resources: ["pods", "configmaps", "secrets"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["apps"]
              resources: ["deployments", "replicasets"]
              verbs: ["get", "list", "watch", "create", "update", "patch"]
            - apiGroups: [""]
              resources: ["events"]
              verbs: ["create"]
          cluster:
            - apiGroups: [""]
              resources: ["nodes"]
              verbs: ["get", "list", "watch"]
    kubeconfig:
      enabled: true
    configuration_type:
      backend: true
      frontend: false
    # ── Application configuration (rendered as ConfigMap) ───────────────
    configuration:
      app:
        name: "Agentic Backend"
        base_url: "/agentic/v1"
        address: "127.0.0.1"
        port: 8000
        log_level: "info"
        reload: false
        reload_dir: "."
        metrics_enabled: true # Prometheus exporter
        metrics_address: "0.0.0.0"
        metrics_port: 9000
        kpi_process_metrics_interval_sec: 0
        kpi_log_summary_interval_sec: 0.0
        kpi_log_summary_top_n: 0

      security:
        m2m:
          enabled: true
          client_id: "agentic"
          realm_url: "http://{YOUR-URL}/{YOUR-REALM/app"
          secret_env_var: KEYCLOAK_AGENTIC_CLIENT_SECRET
        user:
          enabled: true
          client_id: "app"
          realm_url: "http://{YOUR-URL}/{YOUR-REALM/app"
        authorized_origins:
          - "http://{YOUR-URL}:80"
        rebac:
          enabled: true                    # Set false to bypass ReBAC (warning: all private resources will become public)
          type: openfga
          api_url: "http://openfga:8080"    # OpenFGA HTTP endpoint
          # store_name: "fred"                # OpenFGA store name. Reuse the same store across services
          # create_store_if_needed: true      # Automates store bootstrap (disable if pre-provisioned)
          # sync_schema_on_init: true         # Pushes the default Fred authorization model
          # authorization_model_id: null      # Authorization model id to use in case `sync_schema_on_init: false`
          # token_env_var: "OPENFGA_API_TOKEN" # Env var holding the bearer token
          # timeout_millisec: 2000            # Optional request timeout
          # headers:
          #   X-Custom-Header: "value"

      frontend_settings:
        feature_flags:
          # If true activate the backend and frontend modules in charge of K8
          # and frugality monitoring
          enableK8Features: false
          # If true activate support for an electronic warfare demonstration
          enableElecWarfare: false
        properties:
          logoName: "fred"

      scheduler:
        # Scheduler backend driving agent workflows.
        # - "memory": in-process queue for local/dev.
        # - "temporal": use Temporal Cloud/self-hosted to run agent tasks asynchronously.
        backend: "temporal"
        temporal:
          host: "temporal.default.svc.cluster.local:7233"
          namespace: "default"
          task_queue: "agents"
          workflow_id_prefix: "task"
          connect_timeout_seconds: 5
        # Optional progress query name and memo/search attributes can be added here if your
        # cluster uses custom Temporal conventions.

      ai:
        # In production  activate the configuration persistence mechanism
        # that allow users to create/update agents at runtime and change
        # their configuration without redeploying the application.
        use_static_config_only: false
        # Enable catalog mode for modern deployments.
        enable_catalog_mode: true
        # Enable durable SQL checkpointer for v2 runtimes.
        # Disabled by default.
        enable_v2_sql_checkpointer: true
        # Number of past exchanges to restore when initializing an agent session
        # This setting is used to limit the amount of historical context
        # that is loaded into the agent at the beginning of a session. It typically occur after a restart of the application
        # or when an agent session is re-initialized for any reason.
        restore_max_exchanges: 20

        # Interval in milliseconds between partial-stream WebSocket frames (delta protocol).
        # Raise to 200 on high-concurrency deployments to reduce write frequency.
        stream_flush_interval_ms: 100

        # Maximum number of agents that cached in memory for faster access (uses LRU eviction policy)
        max_concurrent_agents: 1024

        # Maximum number of concurrent sessions per user. This is used to prevent abuse and manage resource usage.
        max_concurrent_sessions_per_user: 10

        # Maximum number of files a user can attach across all sessions
        max_attached_files_per_user: 20

        # Maximum size (in MB) for each attached file
        max_attached_file_size_mb: 50

        # Base URL for the Knowledge Flow service
        knowledge_flow_url: "http://knowledge-flow-backend:8111/knowledge-flow/v1"
        # Timeout settings for the client
        timeout:
          connect: 5 # Time to wait for a connection in seconds
          read: 15 # Time to wait for a response in seconds

        # Model defaults are now loaded from `models_catalog.yaml`
        # (image default path or mounted file via `FRED_MODELS_CATALOG_FILE`).

        recursion:
          recursion_limit: 40 # Number or max recursion use by the agents while using the chat model

        # Agent declarations are now loaded from `agents_catalog.yaml`
        # (image default path or mounted file via `FRED_AGENTS_CATALOG_FILE`).

      # MCP servers are now loaded from `mcp_catalog.yaml`
      # (image default path or mounted file via `FRED_MCP_CATALOG_FILE`).

      # ── Storage backends — defaults to DuckDB, switch to postgres/opensearch for prod ──
      storage:
        postgres:              
          host: localhost
          port: 5432
          database: fred
          username: admin
        opensearch:            
          host: https://localhost:9200
          secure: true
          verify_certs: false
          username: admin
        feedback_store:
          type: "duckdb"
          duckdb_path: "/home/fred-user/.fred/agentic/feedback.duckdb"

        agent_store:
          type: "duckdb"
          duckdb_path: "/home/fred-user/.fred/agentic/agent.duckdb"

        mcp_servers_store:
          type: "duckdb"
          duckdb_path: "/home/fred-user/.fred/agentic/mcp_servers.duckdb"

        session_store:
          type: "duckdb"
          duckdb_path: "/home/fred-user/.fred/agentic/session.duckdb"

        history_store:
          type: "duckdb"
          duckdb_path: "/home/fred-user/.fred/agentic/history.duckdb"

        attachments_store:
          type: "duckdb"
          duckdb_path: "/home/fred-user/.fred/agentic/session_attachments.duckdb"

        task_store:
          type: "duckdb"
          duckdb_path: "/home/fred-user/.fred/agentic/task.duckdb"

        kpi_store:
          type: "log"
          level: "DEBUG"
        log_store:
          type: "in_memory"

    # ── Sensitive environment variables (rendered as Kubernetes Secret) ────
    dotenv:                   
      AZURE_OPENAI_API_KEY: ""
      KEYCLOAK_AGENTIC_CLIENT_SECRET: ""
      OPENAI_API_KEY: ""
      LANGFUSE_BASE_URL: ""
      LANGFUSE_PUBLIC_KEY: ""
      LANGFUSE_SECRET_KEY: ""
      OPENSEARCH_PASSWORD: ""
      M2M_CLIENT_SECRET: ""
      OPENFGA_API_TOKEN: ""
      FRED_POSTGRES_PASSWORD: ""

    # ── Catalog files (rendered as additional keys in the backend ConfigMap) ────
    # These files override the versions embedded in the Docker image.
    # Mounted at /app/config/{agents,models,mcp}_catalog.yaml via the same
    # volume as configuration.yaml (agentic-backend-back ConfigMap).

    # ── agents_catalog.yaml — agent definitions ──────────────────────────────
    agents_catalog:
      version: v1
      agents:
        - id: "Georges"
          name: "Georges"
          type: "agent"
          class_path: "agentic_backend.agents.generalist.generalist_expert.Georges"
          enabled: true
          chat_options:
            attach_files: false

        - id: "Rico"
          name: "Rico"
          type: "agent"
          class_path: "agentic_backend.agents.rags.rag_expert.Rico"
          enabled: true
          chat_options:
            search_policy_selection: true
            libraries_selection: true
            search_rag_scoping: true
            deep_search_delegate: false
            attach_files: true
            include_corpus_in_search: true

        - id: "Tessa"
          name: "Tessa"
          type: "agent"
          class_path: "agentic_backend.agents.tabular.tabular_expert.Tessa"
          enabled: true

    # ── models_catalog.yaml — LLM profiles ───────────────────────────────────
    # CUSTOMIZE: update default_profile_by_capability to select default models.
    models_catalog:
      version: v1
      common_model_settings:
        max_retries: 0
        timeout:
          connect: 10.0
          read: 120.0
          write: 30.0
          pool: 5.0
        http_client_limits:
          max_connections: 500
          max_keepalive_connections: 200
          keepalive_expiry_seconds: 10
        temperature: 0.0
      default_profile_by_capability:
        chat: default.chat.openai.prod
        language: default.language.openai.prod
      profiles:
        - profile_id: default.chat.openai.prod
          capability: chat
          description: "Default balanced chat model for production conversations."
          model:
            provider: openai
            name: gpt-5.1
            settings: {}
        - profile_id: default.language.openai.prod
          capability: language
          description: "Default balanced language model for structured text tasks."
          model:
            provider: openai
            name: gpt-5.1
            settings: {}
        - profile_id: default.chat.local
          capability: chat
          description: "Local default chat profile with retries and shorter timeout."
          model:
            provider: openai
            name: gpt-5.1
            settings:
              max_retries: 2
              request_timeout: 90
              temperature: 0.0
        - profile_id: default.language.local
          capability: language
          description: "Local default language profile with retries and shorter timeout."
          model:
            provider: openai
            name: gpt-5.1
            settings:
              max_retries: 2
              request_timeout: 90
              temperature: 0.0
        - profile_id: chat.openai.gpt52
          capability: chat
          description: "Highest-quality GPT-5.2 profile for complex reasoning and synthesis."
          model:
            provider: openai
            name: gpt-5.2
            settings: {}
        - profile_id: language.openai.gpt52
          capability: language
          description: "Highest-quality GPT-5.2 profile for demanding language workloads."
          model:
            provider: openai
            name: gpt-5.2
            settings: {}
        - profile_id: chat.openai.gpt5
          capability: chat
          description: "Strong general-purpose GPT-5 profile, balanced quality and latency."
          model:
            provider: openai
            name: gpt-5
            settings: {}
        - profile_id: language.openai.gpt5
          capability: language
          description: "General-purpose GPT-5 language profile with strong overall quality."
          model:
            provider: openai
            name: gpt-5
            settings: {}
        - profile_id: chat.openai.gpt5mini
          capability: chat
          description: "Faster and lower-cost GPT-5 Mini profile for everyday chat tasks."
          model:
            provider: openai
            name: gpt-5-mini
            settings: {}
        - profile_id: language.openai.gpt5mini
          capability: language
          description: "Faster and lower-cost GPT-5 Mini profile for lightweight language tasks."
          model:
            provider: openai
            name: gpt-5-mini
            settings: {}
        - profile_id: chat.openai.gpt5nano
          capability: chat
          description: "Ultra-fast, budget-oriented GPT-5 Nano profile for simple prompts."
          model:
            provider: openai
            name: gpt-5-nano
            settings: {}
        - profile_id: language.openai.gpt5nano
          capability: language
          description: "Ultra-fast, budget-oriented GPT-5 Nano profile for simple language tasks."
          model:
            provider: openai
            name: gpt-5-nano
            settings: {}
        - profile_id: chat.openai.gpt41
          capability: chat
          description: "Reliable GPT-4.1 profile for broad compatibility and stable outputs."
          model:
            provider: openai
            name: gpt-4.1
            settings: {}
        - profile_id: language.openai.gpt41
          capability: language
          description: "Reliable GPT-4.1 language profile for stable text generation."
          model:
            provider: openai
            name: gpt-4.1
            settings: {}
        - profile_id: chat.openai.gpt41mini
          capability: chat
          description: "Cost-efficient GPT-4.1 Mini profile for quick conversational responses."
          model:
            provider: openai
            name: gpt-4.1-mini
            settings: {}
        - profile_id: language.openai.gpt41mini
          capability: language
          description: "Cost-efficient GPT-4.1 Mini profile for lightweight language work."
          model:
            provider: openai
            name: gpt-4.1-mini
            settings: {}
        - profile_id: chat.azure_apim.gpt4o
          capability: chat
          description: "GPT-4o served via Azure APIM endpoint for enterprise integration."
          model:
            provider: azure-apim
            name: gpt-4o
            settings:
              azure_apim_base_url: "https://trustnest.azure-api.net"
              azure_apim_resource_path: "/genai-aoai-inference/v2"
              azure_openai_api_version: "2024-06-01"
              azure_tenant_id: "${AZURE_TENANT_ID}"
              azure_ad_client_id: "${AZURE_AD_CLIENT_ID}"
              azure_ad_client_scope: "${AZURE_AD_CLIENT_SCOPE}"
        - profile_id: chat.ollama.mistral
          capability: chat
          description: "Local Ollama Mistral profile for private/offline chat experimentation."
          model:
            provider: ollama
            name: "mistral:latest"
            settings:
              base_url: "http://host.docker.internal:11434"
        - profile_id: language.ollama.mistral
          capability: language
          description: "Local Ollama Mistral profile for private/offline language tasks."
          model:
            provider: ollama
            name: "mistral:latest"
            settings:
              base_url: "http://host.docker.internal:11434"
      rules: []

    # ── mcp_catalog.yaml — MCP server endpoints ───────────────────────────────
    # URLs use Kubernetes service names. Override in your values file if needed.
    # CUSTOMIZE: enable/disable servers, adjust URLs for your cluster topology.
    mcp_catalog:
      version: v1
      servers:
        - id: "mcp-knowledge-flow-mcp-text"
          name: "mcp.servers.search_documents.name"
          description: "mcp.servers.search_documents.description"
          transport: "streamable_http"
          url: "http://knowledge-flow-backend:8111/knowledge-flow/v1/mcp-text"
          sse_read_timeout: 2000
          enabled: true
          auth_mode: "user_token"

        - id: "mcp-knowledge-flow-mcp-tabular"
          name: "mcp.servers.tabular.name"
          description: "mcp.servers.tabular.description"
          transport: "streamable_http"
          url: "http://knowledge-flow-backend:8111/knowledge-flow/v1/mcp-tabular"
          sse_read_timeout: 2000
          enabled: true
          auth_mode: "user_token"

        - id: "mcp-knowledge-flow-opensearch-ops"
          name: "mcp.servers.search_opensearch.name"
          description: "mcp.servers.search_opensearch.description"
          transport: "streamable_http"
          url: "http://knowledge-flow-backend:8111/knowledge-flow/v1/mcp-opensearch-ops"
          sse_read_timeout: 2000
          enabled: true
          auth_mode: "user_token"

        - id: "mcp-knowledge-flow-fs"
          name: "mcp.servers.filesystem.name"
          description: "mcp.servers.filesystem.description"
          transport: "streamable_http"
          url: "http://knowledge-flow-backend:8111/knowledge-flow/v1/mcp-fs"
          sse_read_timeout: 2000
          enabled: true
          auth_mode: "user_token"

        - id: "mcp-knowledge-flow-corpus"
          name: "mcp.servers.corpus.name"
          description: "mcp.servers.corpus.description"
          transport: "streamable_http"
          url: "http://knowledge-flow-backend:8111/knowledge-flow/v1/mcp-corpus"
          sse_read_timeout: 2000
          enabled: true
          auth_mode: "user_token"

        - id: "mcp-knowledge-flow-statistics"
          name: "mcp-knowledge-flow-statistics"
          description: "mcp.servers.statistics.description"
          transport: "streamable_http"
          url: "http://knowledge-flow-backend:8111/knowledge-flow/v1/mcp-statistics"
          sse_read_timeout: 2000
          enabled: true
          auth_mode: "user_token"

        - id: "mcp-web-github-readonly"
          name: "mcp.servers.web_github_readonly.name"
          description: "mcp.servers.web_github_readonly.description"
          enabled: true
          transport: "inprocess"
          provider: "web_github_readonly"
          auth_mode: "no_token"

  # ── 3.2 Frontend ───────────────────────────────────────────────────
  frontend:
    enabled: true
    applicationName: frontend
    deployment:
      enabled: true
    replicaCount: 1
    statefulset:
      enabled: false
    job:
      enabled: false
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    image:
      repository: ghcr.io/thalesgroup/fred-agent/frontend
      tag: ""
      pullPolicy: IfNotPresent
    command:
      enabled: false
    env:
      - name: VITE_ALLOWED_HOSTS
        value: "fred.dev"
      - name: FRONTEND_AGENTIC_UPSTREAM
        value: "http://agentic-backend"
      - name: FRONTEND_KNOWLEDGE_FLOW_UPSTREAM
        value: "http://knowledge-flow-backend:8000"
      - name: FRONTEND_CONTROL_PLANE_UPSTREAM
        value: "http://control-plane-backend:8222"
      - name: VITE_BACKEND_URL_KNOWLEDGE
        value: "{YOUR-KF-URL}"
      - name: VITE_USE_AUTH
        value: "true"
    ports:
      - name: http
        containerPort: 8080
    service:
      annotations: {}
      extraLabels: {}
      type: ClusterIP
      ports:
        - name: http
          port: 80
          targetPort: 8080
    ingress:
      enabled: true
      className: "nginx"
      hosts:
        - host: {YOUR-URL}
          paths:
            - path: /
              pathType: Prefix
              service:
                name: frontend
                port: 80
            - path: /agentic
              pathType: Prefix
              service:
                name: agentic-backend
                port: 80
            - path: /knowledge-flow
              pathType: Prefix
              service:
                name: knowledge-flow-backend
                port: 8000
      tls:
        - secretName: frontend-crt
          hosts:
            - {YOUR-URL}
    volumeMounts:
      - name: frontend-config-vol
        mountPath: /usr/share/nginx/html/config.json
        subPath: config.json
      - name: frontend-config-vol
        mountPath: /usr/share/nginx/html/keycloak.json
        subPath: keycloak.json
    volumes:
      - name: frontend-config-vol
        configMap:
          name: frontend-front
    probes:
      lifecycle:
        enabled: true
      livenessProbe:
        enabled: true
        data:
          httpGet:
            path: /healthz.html
            port: 8080
      readinessProbe:
        enabled: true
        data:
          httpGet:
            path: /ready.html
            port: 8080
      startupProbe:
        enabled: false
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - "ALL"
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    serviceAccount:
      annotations: {}
      labels: {}
      automountServiceAccountToken: true
      rbac:
        enabled: true
        permissions: {}
    kubeconfig:
      enabled: false
    configuration_type:
      frontend: true
      backend: false
    configuration:
      config_json:
        frontend_basename: "/"

  # ── 3.3 Knowledge Flow Backend ─────────────────────────────────────
  knowledge-flow-backend:
    enabled: true
    applicationName: knowledge-flow-backend
    configurationFileName: configuration.yaml
    deployment:
      enabled: true
    replicaCount: 1
    statefulset:
      enabled: false
    job:
      enabled: false
    migration:
      enabled: false    # Enable when knowledge-flow-backend gets Alembic migrations
      scaleDown: true
      backoffLimit: 3
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    image:
      repository: ghcr.io/thalesgroup/fred-agent/knowledge-flow-backend
      tag: ""                 
    command:
      enabled: true
      data:
        - "uvicorn"
        - "knowledge_flow_backend.main:create_app"
        - "--factory"
        - "--host"
        - "0.0.0.0"
        - "--port"
        - "8111"
        - "--loop"
        - "asyncio"
    env:
      - name: CONFIG_FILE
        value: "/app/config/configuration.yaml"
    ports:
      - name: http
        containerPort: 8111
      - name: metrics
        containerPort: 9111
      - name: https
        containerPort: 8443
    service:
      annotations: {}
      extraLabels: {}
      type: ClusterIP
      ports:
        - name: "http"
          port: 8000
          targetPort: 8111
          protocol: TCP
        - name: "https"
          port: 8443
          targetPort: 8443
          protocol: TCP
    metricsService:
      enabled: true
      annotations: {}
      extraLabels: {}
      type: ClusterIP
      port: 9111
      targetPort: 9111
      serviceMonitor:
        enabled: false
        annotations: {}
        labels: {}
        interval: 30s
        scrapeTimeout: 10s
        path: /metrics
        scheme: http
        honorLabels: false
        relabelings: []
        metricRelabelings: []
        namespaceSelector: {}
    ingress:
      enabled: false
      className: ""
      hosts: []
    volumeMounts:
      - name: knowledge-flow-backend-vol
        mountPath: /app/config/configuration.yaml
        subPath: configuration.yaml
      - name: knowledge-flow-backend-env-vol
        mountPath: /app/config/.env
        subPath: .env
    volumes:
      - name: knowledge-flow-backend-vol
        configMap:
          name: knowledge-flow-backend-back
      - name: knowledge-flow-backend-env-vol
        secret:
          secretName: knowledge-flow-backend-env
    probes:
      lifecycle:
        enabled: false
      livenessProbe:
        enabled: true
        data:
          failureThreshold: 10
          httpGet:
            path: /knowledge-flow/v1/healthz
            port: 8111
          periodSeconds: 10
      readinessProbe:
        enabled: true
        data:
          failureThreshold: 10
          httpGet:
            path: /knowledge-flow/v1/ready
            port: 8111
          periodSeconds: 10
      startupProbe:
        enabled: false
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - "ALL"
      runAsUser: 1000
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    serviceAccount:
      annotations: {}
      labels: {}
      automountServiceAccountToken: true
      rbac:
        enabled: true
        permissions: {}
    kubeconfig:
      enabled: false
    configuration_type:
      backend: true
      frontend: false
    # ── Application configuration (rendered as ConfigMap) ───────────────
    configuration:
      app:
        name: "Knowledge Flow Backend"
        base_url: "/knowledge-flow/v1"
        address: "127.0.0.1"
        port: 8111
        log_level: "info"
        reload: false
        reload_dir: "."
        metrics_enabled: true # Prometheus exporter
        metrics_address: "0.0.0.0"
        metrics_port: 9111
        kpi_process_metrics_interval_sec: 0
        kpi_log_summary_interval_sec: 0.0
        kpi_log_summary_top_n: 0
        max_ingestion_workers: 3

      # ── Ingestion profiles — see Section 1 for anchor definitions ──────────
      processing:
        default_profile: fast
        profiles:
          fast:   *profile-fast
          medium: *profile-medium
          rich:   *profile-rich-backend

      security:        *kf-security
      scheduler:       *kf-scheduler
      content_storage: *kf-content-storage
      document_sources: *kf-document-sources
      embedding_model: *kf-embedding-model
      chat_model:      *kf-chat-model
      vision_model:    *kf-vision-model
      crossencoder_model: *kf-crossencoder-model
      storage:         *kf-storage
      integrations:
        prometheus:
          # base_url: http://prometheus:9090
          # verify_ssl: false
          # timeout_seconds: 15.0
          # username: admin
      mcp:             *kf-mcp
      filesystem:      *kf-filesystem

    # ── Sensitive environment variables (rendered as Kubernetes Secret) ────
    dotenv:                  
      KEYCLOAK_KNOWLEDGE_FLOW_CLIENT_SECRET: ""
      MINIO_SECRET_KEY: ""
      OPENAI_API_KEY: ""
      OPENSEARCH_PASSWORD: ""
      PROMETHEUS_PASSWORD: ""
      PROMETHEUS_BEARER_TOKEN: ""
      OPENFGA_API_TOKEN: ""
      FRED_POSTGRES_PASSWORD: ""
      TABULAR_POSTGRES_PASSWORD: ""

  # ── 3.4 Knowledge Flow Worker (Temporal) ───────────────────────────
  # Toggle Temporal worker pod deployment.
  # Note: You need to have set knowledge-flow-backend.configuration.scheduler.enabled = true
  # otherwise this deployment will not be created.
  knowledge-flow-worker:
    enabled: false
    applicationName: knowledge-flow-worker
    configurationFileName: configuration.yaml
    deployment:
      enabled: false
    replicaCount: 3 # 3 temporal workers
    statefulset:
      enabled: false
    job:
      enabled: false
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    image:
      repository: ghcr.io/thalesgroup/fred-agent/knowledge-flow-backend
      tag: ""                 
    command:
      enabled: true
      data:
        - "python"
        - "-m"
        - "knowledge_flow_backend.main_worker"
    env:
      - name: CONFIG_FILE
        value: "/app/config/configuration.yaml"
    ports:
      - name: worker
        containerPort: 8112
      - name: metrics
        containerPort: 9112
    service:
      enabled: false
      annotations: {}
      extraLabels: {}
      type: ClusterIP
      ports:
        - name: worker
          port: 8112
          targetPort: 8112
          protocol: TCP
    metricsService:
      enabled: true
      annotations: {}
      extraLabels: {}
      type: ClusterIP
      port: 9112
      targetPort: 9112
      serviceMonitor:
        enabled: false
        annotations: {}
        labels: {}
        interval: 30s
        scrapeTimeout: 10s
        path: /metrics
        scheme: http
        honorLabels: false
        relabelings: []
        metricRelabelings: []
        namespaceSelector: {}
    ingress:
      enabled: false
      className: ""
      hosts: []
    volumeMounts:
      - name: knowledge-flow-worker-vol
        mountPath: /app/config/configuration.yaml
        subPath: configuration.yaml
      - name: knowledge-flow-worker-env-vol
        mountPath: /app/config/.env
        subPath: .env
    volumes:
      - name: knowledge-flow-worker-vol
        configMap:
          name: knowledge-flow-worker-back
      - name: knowledge-flow-worker-env-vol
        secret:
          secretName: knowledge-flow-backend-env
    probes:
      lifecycle:
        enabled: false
      livenessProbe:
        enabled: false
        data: {}
      readinessProbe:
        enabled: false
        data: {}
      startupProbe:
        enabled: false
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - "ALL"
      runAsUser: 1000
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    serviceAccount:
      annotations: {}
      labels: {}
      automountServiceAccountToken: true
      rbac:
        enabled: true
        permissions: {}
    kubeconfig:
      enabled: false
    configuration_type:
      backend: true
      frontend: false
    # ── Application configuration (rendered as ConfigMap) ───────────────
    # Most sections are shared with knowledge-flow-backend via YAML anchors.
    # Only app (port 8112) and processing.rich.generate_summary differ.
    configuration:
      app:
        name: "Knowledge Flow Backend"
        base_url: "/knowledge-flow/v1"
        address: "127.0.0.1"
        port: 8112
        log_level: "info"
        reload: false
        reload_dir: "."
        metrics_enabled: true # Prometheus exporter
        metrics_address: "0.0.0.0"
        metrics_port: 9112
        kpi_process_metrics_interval_sec: 0
        kpi_log_summary_interval_sec: 0.0
        kpi_log_summary_top_n: 0

      # ── rich.generate_summary=true for the worker (generates summaries at ingestion) ──
      processing:
        default_profile: fast
        profiles:
          fast:   *profile-fast
          medium: *profile-medium
          rich:   *profile-rich-worker

      security:        *kf-security
      scheduler:       *kf-scheduler
      content_storage: *kf-content-storage
      document_sources: *kf-document-sources
      embedding_model: *kf-embedding-model
      chat_model:      *kf-chat-model
      vision_model:    *kf-vision-model
      crossencoder_model: *kf-crossencoder-model
      storage:         *kf-storage
      integrations:
        prometheus:
          # base_url: http://prometheus:9090
          # verify_ssl: false
          # timeout_seconds: 15.0
          # username: admin
      mcp:             *kf-mcp
      filesystem:      *kf-filesystem

    # ── Sensitive environment variables (rendered as Kubernetes Secret) ────
    dotenv:
      KEYCLOAK_KNOWLEDGE_FLOW_CLIENT_SECRET: ""
      MINIO_SECRET_KEY: ""
      OPENAI_API_KEY: ""
      OPENSEARCH_PASSWORD: ""
      PROMETHEUS_PASSWORD: ""
      PROMETHEUS_BEARER_TOKEN: ""
      OPENFGA_API_TOKEN: ""
      FRED_POSTGRES_PASSWORD: ""
      TABULAR_POSTGRES_PASSWORD: ""

  # ── 3.5 Control Plane Backend ─────────────────────────────────────
  control-plane-backend:
    enabled: true
    applicationName: control-plane-backend
    deployment:
      enabled: true
    replicaCount: 1
    statefulset:
      enabled: false
    job:
      enabled: false
    migration:
      enabled: false    # Enable when control-plane-backend gets Alembic migrations
      scaleDown: true
      backoffLimit: 3
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    image:
      repository: ghcr.io/thalesgroup/fred-agent/control-plane-backend
      tag: ""
      pullPolicy: IfNotPresent
    command:
      enabled: true
      data:
        - "uvicorn"
        - "control_plane_backend.main:create_app"
        - "--factory"
        - "--host"
        - "0.0.0.0"
        - "--port"
        - "8222"
        - "--loop"
        - "asyncio"
    env:
      - name: CONFIG_FILE
        value: "/app/config/configuration.yaml"
    ports:
      - name: http
        containerPort: 8222
      - name: metrics
        containerPort: 9222
    service:
      annotations: {}
      extraLabels: {}
      type: ClusterIP
      ports:
        - name: http
          port: 8222
          targetPort: 8222
    metricsService:
      enabled: false
      annotations: {}
      extraLabels: {}
      type: ClusterIP
      port: 9222
      targetPort: 9222
      serviceMonitor:
        enabled: false
        annotations: {}
        labels: {}
        interval: 30s
        scrapeTimeout: 10s
        path: /metrics
        scheme: http
        honorLabels: false
        relabelings: []
        metricRelabelings: []
        namespaceSelector: {}
    ingress:
      enabled: false
      className: ""
      hosts: []
    volumeMounts:
      - name: control-plane-backend-vol
        mountPath: /app/config/configuration.yaml
        subPath: configuration.yaml
      - name: control-plane-backend-catalog-vol
        mountPath: /app/config/conversation_policy_catalog.yaml
        subPath: conversation_policy_catalog.yaml
      - name: control-plane-backend-env-vol
        mountPath: /app/config/.env
        subPath: .env
    volumes:
      - name: control-plane-backend-vol
        configMap:
          name: control-plane-backend-back
      - name: control-plane-backend-catalog-vol
        configMap:
          name: control-plane-backend-catalog
      - name: control-plane-backend-env-vol
        secret:
          secretName: control-plane-backend-env
    probes:
      lifecycle:
        enabled: false
      livenessProbe:
        enabled: true
        data:
          failureThreshold: 10
          httpGet:
            path: /control-plane/v1/healthz
            port: 8222
          periodSeconds: 10
      readinessProbe:
        enabled: true
        data:
          failureThreshold: 10
          httpGet:
            path: /control-plane/v1/ready
            port: 8222
          periodSeconds: 10
      startupProbe:
        enabled: false
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - "ALL"
      runAsUser: 1000
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    serviceAccount:
      annotations: {}
      labels: {}
      automountServiceAccountToken: true
      rbac:
        enabled: true
        permissions: {}
    kubeconfig:
      enabled: false
    configuration_type:
      backend: true
      frontend: false
    configurationFileName: "configuration.yaml"
    # ── Application configuration (rendered as ConfigMap) ───────────────
    configuration:
      app:
        name: "Control Plane Backend"
        base_url: "/control-plane/v1"
        address: "127.0.0.1"
        port: 8222
        log_level: "info"

      security:  *cp-security
      scheduler: *cp-scheduler
      storage:   *cp-storage

      policies:
        purge_catalog_path: /app/config/conversation_policy_catalog.yaml

    # ── Conversation policy catalog (rendered as ConfigMap via configmap-catalog) ──
    conversation_policy_catalog:
      version: v1
      conversation_policies:
        purge:
          default:
            mode: deferred_delete
            retention: PT30S
            cancel_on_rejoin: true
          rules:
            - rule_id: purge.team.swiftpost
              match:
                team_id: swiftpost
                trigger: member_removed
              action:
                retention: PT60S
            - rule_id: purge.team.northbridge
              match:
                team_id: northbridge
                trigger: member_removed
              action:
                retention: PT120S

    # ── Sensitive environment variables (rendered as Kubernetes Secret) ────
    dotenv:
      KEYCLOAK_CONTROL_PLANE_CLIENT_SECRET: ""
      OPENFGA_API_TOKEN: ""
      MINIO_SECRET_KEY: ""
      FRED_POSTGRES_PASSWORD: ""

  # ── 3.6 Control Plane Worker ──────────────────────────────────────
  control-plane-worker:
    enabled: false
    applicationName: control-plane-worker
    deployment:
      enabled: false
    replicaCount: 1
    statefulset:
      enabled: false
    job:
      enabled: false
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    image:
      repository: ghcr.io/thalesgroup/fred-agent/control-plane-backend
      tag: ""
      pullPolicy: IfNotPresent
    command:
      enabled: true
      data:
        - "python"
        - "-m"
        - "control_plane_backend.main_worker"
    env:
      - name: CONFIG_FILE
        value: "/app/config/configuration.yaml"
    ports:
      - name: worker
        containerPort: 8223
    service:
      enabled: false
      annotations: {}
      extraLabels: {}
      type: ClusterIP
      ports:
        - name: worker
          port: 8223
          targetPort: 8223
          protocol: TCP
    metricsService:
      enabled: false
      annotations: {}
      extraLabels: {}
      type: ClusterIP
      port: 9222
      targetPort: 9222
      serviceMonitor:
        enabled: false
        annotations: {}
        labels: {}
        interval: 30s
        scrapeTimeout: 10s
        path: /metrics
        scheme: http
        honorLabels: false
        relabelings: []
        metricRelabelings: []
        namespaceSelector: {}
    ingress:
      enabled: false
      className: ""
      hosts: []
    volumeMounts:
      - name: control-plane-worker-vol
        mountPath: /app/config/configuration.yaml
        subPath: configuration.yaml
      - name: control-plane-worker-env-vol
        mountPath: /app/config/.env
        subPath: .env
    volumes:
      - name: control-plane-worker-vol
        configMap:
          name: control-plane-worker-back
      - name: control-plane-worker-env-vol
        secret:
          secretName: control-plane-backend-env
    probes:
      lifecycle:
        enabled: false
      livenessProbe:
        enabled: false
        data: {}
      readinessProbe:
        enabled: false
        data: {}
      startupProbe:
        enabled: false
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - "ALL"
      runAsUser: 1000
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    serviceAccount:
      annotations: {}
      labels: {}
      automountServiceAccountToken: true
      rbac:
        enabled: true
        permissions: {}
    kubeconfig:
      enabled: false
    configuration_type:
      backend: true
      frontend: false
    configurationFileName: "configuration.yaml"
    # ── Application configuration (rendered as ConfigMap) ───────────────
    configuration:
      app:
        name: "Control Plane Backend"
        base_url: "/control-plane/v1"
        address: "127.0.0.1"
        port: 8223
        log_level: "info"

      security:  *cp-security
      scheduler: *cp-scheduler
      storage:   *cp-storage

      policies:
        purge_catalog_path: /app/config/conversation_policy_catalog.yaml

    # ── Sensitive environment variables (rendered as Kubernetes Secret) ────
    dotenv:
      KEYCLOAK_CONTROL_PLANE_CLIENT_SECRET: ""
      OPENFGA_API_TOKEN: ""
      MINIO_SECRET_KEY: ""
      FRED_POSTGRES_PASSWORD: ""
