app:
  name: "Knowledge Flow Backend"
  base_url: "/knowledge-flow/v1"
  address: "127.0.0.1"
  port: 8111
  log_level: "warning"
  reload: false
  reload_dir: "."
  metrics_enabled: false
  metrics_address: "0.0.0.0"
  metrics_port: 9111
  kpi_process_metrics_interval_sec: 10
  kpi_log_summary_interval_sec: 10.0
  kpi_log_summary_top_n: 20
  max_ingestion_workers: 3

processing:
  default_profile: fast
  profiles:
    fast:
      use_gpu: true
      generate_summary: false
      process_images: false
      text_splitter:
        chunk_size: 1500
        chunk_overlap: 150
        preserve_tables: true
      pdf:
        backend: pypdfium2
        images_scale: 1.0
        generate_picture_images: false
        generate_page_images: false
        generate_table_images: false
        do_table_structure: false
        do_ocr: false
      input_processors:
        - suffix: ".pdf"
          class_path: knowledge_flow_backend.core.processors.input.lightweight_markdown_processor.lite_pdf_to_md_processor.LitePdfMarkdownProcessor
        - suffix: ".docx"
          class_path: knowledge_flow_backend.core.processors.input.docx_markdown_processor.docx_markdown_processor.DocxMarkdownProcessor
        - suffix: ".pptx"
          class_path: knowledge_flow_backend.core.processors.input.pptx_markdown_processor.pptx_markdown_processor.PptxMarkdownProcessor
        - suffix: ".csv"
          class_path: knowledge_flow_backend.core.processors.input.csv_tabular_processor.csv_tabular_processor.CsvTabularProcessor
        - suffix: ".txt"
          class_path: knowledge_flow_backend.core.processors.input.text_markdown_processor.text_markdown_processor.TextMarkdownProcessor
        - suffix: ".md"
          class_path: knowledge_flow_backend.core.processors.input.markdown_markdown_processor.markdown_markdown_processor.MarkdownMarkdownProcessor
        - suffix: ".jsonl"
          class_path: knowledge_flow_backend.core.processors.input.jsonl.jsonl_markdown_processor.JsonlMarkdownProcessor
        - suffix: ".png"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".jpg"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".jpeg"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".gif"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".bmp"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".svg"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".webp"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".ico"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
    medium:
      use_gpu: true
      generate_summary: false
      process_images: false
      text_splitter:
        chunk_size: 1500
        chunk_overlap: 150
        preserve_tables: true
      pdf:
        backend: docling_parse
        images_scale: 1.5
        generate_picture_images: false
        generate_page_images: false
        generate_table_images: false
        do_table_structure: true
        do_ocr: true
        ocr_backend: openvino
        force_full_page_ocr: true
      input_processors:
        - suffix: ".pdf"
          class_path: knowledge_flow_backend.core.processors.input.pdf_markdown_processor.pdf_markdown_processor.PdfMarkdownProcessor
        - suffix: ".docx"
          class_path: knowledge_flow_backend.core.processors.input.docx_markdown_processor.docx_markdown_processor.DocxMarkdownProcessor
        - suffix: ".pptx"
          class_path: knowledge_flow_backend.core.processors.input.pptx_markdown_processor.pptx_markdown_processor.PptxMarkdownProcessor
        - suffix: ".csv"
          class_path: knowledge_flow_backend.core.processors.input.csv_tabular_processor.csv_tabular_processor.CsvTabularProcessor
        - suffix: ".txt"
          class_path: knowledge_flow_backend.core.processors.input.text_markdown_processor.text_markdown_processor.TextMarkdownProcessor
        - suffix: ".md"
          class_path: knowledge_flow_backend.core.processors.input.markdown_markdown_processor.markdown_markdown_processor.MarkdownMarkdownProcessor
        - suffix: ".jsonl"
          class_path: knowledge_flow_backend.core.processors.input.jsonl.jsonl_markdown_processor.JsonlMarkdownProcessor
        - suffix: ".png"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".jpg"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".jpeg"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".gif"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".bmp"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".svg"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".webp"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".ico"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
    rich:
      use_gpu: true
      generate_summary: false
      process_images: true
      text_splitter:
        chunk_size: 1500
        chunk_overlap: 150
        preserve_tables: true
      pdf:
        backend: docling_parse
        images_scale: 2.0
        generate_picture_images: true
        generate_page_images: false
        generate_table_images: false
        do_table_structure: true
        do_ocr: true
        ocr_backend: openvino
        force_full_page_ocr: true
      input_processors:
        - suffix: ".pdf"
          class_path: knowledge_flow_backend.core.processors.input.pdf_markdown_processor.pdf_markdown_processor.PdfMarkdownProcessor
        - suffix: ".docx"
          class_path: knowledge_flow_backend.core.processors.input.docx_markdown_processor.docx_markdown_processor.DocxMarkdownProcessor
        - suffix: ".pptx"
          class_path: knowledge_flow_backend.core.processors.input.pptx_markdown_processor.pptx_markdown_processor.PptxMarkdownProcessor
        - suffix: ".csv"
          class_path: knowledge_flow_backend.core.processors.input.csv_tabular_processor.csv_tabular_processor.CsvTabularProcessor
        - suffix: ".txt"
          class_path: knowledge_flow_backend.core.processors.input.text_markdown_processor.text_markdown_processor.TextMarkdownProcessor
        - suffix: ".md"
          class_path: knowledge_flow_backend.core.processors.input.markdown_markdown_processor.markdown_markdown_processor.MarkdownMarkdownProcessor
        - suffix: ".jsonl"
          class_path: knowledge_flow_backend.core.processors.input.jsonl.jsonl_markdown_processor.JsonlMarkdownProcessor
        - suffix: ".png"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".jpg"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".jpeg"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".gif"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".bmp"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".svg"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".webp"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".ico"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor

security:
  m2m:
    enabled: false
    client_id: "knowledge-flow"
    realm_url: "http://app-keycloak:8080/realms/app"
    secret_env_var: KEYCLOAK_KNOWLEDGE_FLOW_CLIENT_SECRET # pragma: allowlist secret
  user:
    enabled: false
    client_id: "app"
    realm_url: "http://app-keycloak:8080/realms/app"
  authorized_origins:
    - "http://localhost:5173"
  rebac:
    enabled: false
    type: openfga
    api_url: "http://localhost:9080"

scheduler:
  enabled: true
  backend: "temporal"
  temporal:
    host: "localhost:7233"
    namespace: "default"
    task_queue: "ingestion"
    workflow_id_prefix: "pipeline"
    connect_timeout_seconds: 5

content_storage:
  type: minio
  endpoint: http://localhost:9000
  access_key: "admin"
  bucket_name: "knowledge-flow-content"
  secure: false

document_sources:
  fred:
    type: push
    description: "Documents manually uploaded by users"

chat_model:
  provider: openai
  name: gpt-4o-mini # any chat-capable model (gpt-4o, gpt-4o-mini, gpt-4.1, etc.)
  settings:
    temperature: 0
    max_retries: 0
    timeout:
      connect: 10.0
      read: 120.0
    http_client_limits:
      max_connections: 500
      max_keepalive_connections: 0
      keepalive_expiry_seconds: 10
embedding_model:
  provider: openai
  name: text-embedding-3-large # or text-embedding-3-small
  settings:
    max_retries: 0
    timeout:
      connect: 10.0
      read: 120.0
    http_client_limits:
      max_connections: 500
      max_keepalive_connections: 0
      keepalive_expiry_seconds: 10

vision_model:
  provider: openai
  name: gpt-4o-mini # or gpt-4o if you want higher fidelity
  settings:
    max_retries: 0
    timeout:
      connect: 10.0
      read: 120.0
    http_client_limits:
      max_connections: 500
      max_keepalive_connections: 0
      keepalive_expiry_seconds: 10
    temperature: 0 # optional
crossencoder_model:
  name: cross-encoder/ms-marco-MiniLM-L-12-v2
  settings:
    online: true
    local_path: ~/.cache/huggingface/hub
    max_retries: 0
    timeout:
      connect: 10.0
      read: 120.0
    http_client_limits:
      max_connections: 500
      max_keepalive_connections: 0
      keepalive_expiry_seconds: 10

storage:
  postgres:
    host: localhost
    port: 5432
    database: fred
    username: fred
    pool_size: 2
    max_overflow: 0
    pool_timeout: 30
    pool_recycle: 1800
    pool_pre_ping: true

  opensearch:
    host: https://localhost:9200
    secure: true
    verify_certs: false
    username: admin
  # clickhouse:
  #   host: localhost
  #   port: 8123
  #   database: fred
  #   username: fred
  #   secure: false
  #   verify: true


  resource_store:
    type: "postgres"

  kpi_store:
    type: "log"
    level: "DEBUG"

  tag_store:
    type: "postgres"

  metadata_store:
    type: "postgres"
  task_store:
    type: "postgres"
  tabular_store:
    artifacts_prefix: "tabular/datasets"
    format: "parquet"
    compression: "snappy"
    query:
      engine: "duckdb"
      access_mode: "presigned_url"
      internal_presigned_ttl_seconds: 3600
      default_max_rows: 200
      max_rows: 1000

  vector_store:
    type: opensearch
    index: vector-index
    # type: clickhouse
    # table: fred_vectors
    # Default bulk size for vector insertions is 500. Increase if you have
    # enough memory and want faster ingestion. Or if run into ingestion errors
    # while ingesting large documents.
    bulk_size: 1000

  log_store:
    type: "in_memory"

# integrations:
#   prometheus:
#     base_url: http://prometheus:9090
#     verify_ssl: false
#     timeout_seconds: 15.0
#     username: admin  # optional; defaults to admin, password comes from PROMETHEUS_PASSWORD

mcp:
  reports_enabled: true
  kpi_enabled: true
  tabular_enabled: true
  statistic_enabled: true
  text_enabled: true
  templates_enabled: true
  resources_enabled: true
  opensearch_ops_enabled: true
  prometheus_ops_enabled: false
  neo4j_enabled: false
  filesystem_enabled: true

filesystem:
  type: minio
  endpoint: http://localhost:9000
  access_key: admin
  bucket_name: filesystem
  secure: false

# Workspace storage layout (paths inside the bucket/filesystem)
workspace_layout:
  user_pattern: "users/{user_id}/{key}"
  agent_config_pattern: "agents/{agent_id}/config/{key}"
  agent_user_pattern: "agents/{agent_id}/users/{user_id}/{key}"
